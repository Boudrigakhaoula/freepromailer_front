<div class="login-page">
  <div class="login-bg-blob left"></div>
  <div class="login-bg-blob right"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
          <path d="M22 2L11 13"/>
          <path d="M22 2L15 22 11 13 2 9l20-7z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>FreeProMailer</h1>
      <p>Connectez-vous pour gérer vos campagnes</p>
    </div>

    <form (ngSubmit)="login()" class="login-form" [formGroup]="loginForm">
      <div class="form-group">
        <label class="form-label">Email Professionnel</label>
        <div class="input-wrap" [class.invalid]="isInvalid('email')">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" formControlName="email" placeholder="nom@entreprise.com" class="form-input with-icon" />
        </div>
      </div>

      <div class="form-group">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <label class="form-label">Mot de passe</label>
          <button type="button" class="link-btn">Oublié ?</button>
        </div>
        <div class="input-wrap" [class.invalid]="isInvalid('password')">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" formControlName="password" placeholder="••••••••••••" class="form-input with-icon" />
        </div>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:1rem" [disabled]="isSubmitting">
        @if (isSubmitting) {
          Connexion en cours...
        } @else {
          Se connecter
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        }
      </button>

      @if (errorMessage) {
        <p class="error-text">{{ errorMessage }}</p>
      }
    </form>

    <p class="login-footer">
      Pas encore de compte ? 
      <a routerLink="/register" class="link-btn">Créer un compte gratuitement</a>
    </p>
  </div>
</div>
